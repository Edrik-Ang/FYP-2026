<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login Page</title>
    </head>
    <body>
    <h1> Login to your account </h1>
    <h2> Please enter your credentials </h2>
    {% if error %}
    <p style="color:red;">
        {{ error }}
    </p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <p>
            Username:
            <input 
                type="text"
                name="username"  
                required
            >
        </p>

        <p>
            Password:
            <input
                type="password" 
                name="password"  
                required>
        </p>
            <button type="submit">Login</button>
        </form>
    </body>
</html>
