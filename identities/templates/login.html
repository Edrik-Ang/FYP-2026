<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login Page</title>
    </head>
    <body>
    <h1> Login to your account </h1>
    <h2> Please enter your credentials </h2>
    <form method="post">
        {% csrf_token %}
        <p>
            <label for="username"> Username: </label>
            <input 
                type="text"
                id="username"
                name="username"  
                required
            >
        </p>

        <p>
            <label for="password"> Password: </label>
            <input
                type="password" 
                id="password"
                name="password"  
                required>
        </p>
            <button type="submit">Login</button>
        </form>
    </body>
</html>
